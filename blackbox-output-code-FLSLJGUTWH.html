<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jarvis GPT</title>
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="icon-192.png">
    <meta name="theme-color" content="#1e90ff">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <style>
        /* MOBILE-OPTIMIZED CSS - SAME AS BEFORE BUT MOBILE FIRST */
        :root {
            --bg-primary: #0f0f23;
            --bg-secondary: #1a1a2e;
            --accent-blue: #1e90ff;
            --accent-green: #00ff88;
            --text-primary: #ffffff;
            --text-secondary: #b0b0b0;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: system-ui, -apple-system, sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            height: 100vh;
            overflow: hidden;
            -webkit-font-smoothing: antialiased;
        }

        .app-container {
            height: 100vh;
            display: flex;
            flex-direction: column;
            position: relative;
        }

        .header {
            background: rgba(0,0,0,0.9);
            padding: 16px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-bottom: 1px solid rgba(30,144,255,0.3);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .logo {
            font-size: 20px;
            font-weight: 700;
            background: linear-gradient(135deg, #1e90ff, #8a2be2);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .status {
            padding: 4px 12px;
            background: rgba(0,255,136,0.2);
            border-radius: 20px;
            font-size: 12px;
            border: 1px solid #00ff88;
        }

        .main-content {
            flex: 1;
            display: flex;
            overflow: hidden;
        }

        .chat-area {
            flex: 1;
            display: flex;
            flex-direction: column;
            padding: 16px;
        }

        .chat-messages {
            flex: 1;
            overflow-y: auto;
            padding-right: 8px;
            scroll-behavior: smooth;
        }

        .message {
            margin-bottom: 20px;
            display: flex;
            gap: 12px;
            animation: slideIn 0.3s ease-out;
        }

        @keyframes slideIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .message.user { flex-direction: row-reverse; }
        .message-content {
            max-width: 85%;
            padding: 14px 18px;
            border-radius: 20px;
            font-size: 16px;
            line-height: 1.4;
        }

        .message.user .message-content {
            background: linear-gradient(135deg, #1e90ff, #4169e1);
            border-bottom-right-radius: 6px;
        }

        .message.ai .message-content {
            background: rgba(255,255,255,0.08);
            border: 1px solid rgba(30,144,255,0.3);
            border-bottom-left-radius: 6px;
            backdrop-filter: blur(10px);
        }

        .input-area {
            padding-top: 16px;
            border-top: 1px solid rgba(30,144,255,0.3);
        }

        .input-wrapper {
            display: flex;
            gap: 12px;
            background: rgba(0,0,0,0.5);
            padding: 14px 16px;
            border-radius: 24px;
            border: 1px solid rgba(30,144,255,0.3);
        }

        .input-field {
            flex: 1;
            background: transparent;
            border: none;
            color: white;
            font-size: 16px;
            outline: none;
            resize: none;
            max-height: 100px;
        }

        .send-btn {
            width: 44px;
            height: 44px;
            border: none;
            border-radius: 50%;
            background: #1e90ff;
            color: white;
            cursor: pointer;
        }

        .send-btn:active {
            transform: scale(0.95);
        }

        .typing {
            display: none;
            padding: 14px 18px;
            background: rgba(255,255,255,0.08);
            border-radius: 20px;
            border: 1px solid rgba(30,144,255,0.3);
            margin: 16px 0;
        }

        .typing-dots {
            display: flex;
            gap: 6px;
            justify-content: center;
        }

        .dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #1e90ff;
            animation: typing 1.4s infinite;
        }

        .dot:nth-child(2) { animation-delay: 0.2s; }
        .dot:nth-child(3) { animation-delay: 0.4s; }

        @keyframes typing {
            0%, 60%, 100% { transform: scale(1); }
            30% { transform: scale(1.4); }
        }

        .sidebar-btn {
            position: absolute;
            top: 20px;
            left: 16px;
            z-index: 200;
            background: rgba(0,0,0,0.8);
            border: 1px solid rgba(30,144,255,0.5);
            border-radius: 50%;
            width: 48px;
            height: 48px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            cursor: pointer;
        }

        .sidebar {
            position: fixed;
            top: 0;
            left: -300px;
            width: 280px;
            height: 100vh;
            background: var(--bg-secondary);
            transition: left 0.3s;
            z-index: 150;
            padding: 80px 20px 20px;
        }

        .sidebar.open {
            left: 0;
        }

        .new-chat {
            width: 100%;
            padding: 14px;
            background: rgba(30,144,255,0.1);
            border: 1px solid rgba(30,144,255,0.3);
            border-radius: 12px;
            color: white;
            cursor: pointer;
            margin-bottom: 20px;
        }

        .god-mode {
            position: fixed;
            bottom: 20px;
            right: 20px;
            width: 60px;
            height: 60px;
            border-radius: 50%;
            background: linear-gradient(45deg, #00ff88, #00cc66);
            border: none;
            color: #000;
            font-weight: bold;
            font-size: 18px;
            cursor: pointer;
            box-shadow: 0 10px 30px rgba(0,255,136,0.4);
            z-index: 300;
            animation: glow 2s infinite;
        }

        @keyframes glow {
            0%, 100% { box-shadow: 0 10px 30px rgba(0,255,136,0.4); }
            50% { box-shadow: 0 10px 40px rgba(0,255,136,0.7); }
        }

        @media (min-width: 768px) {
            .sidebar { left: 0; position: relative; }
            .sidebar-btn { display: none; }
        }
    </style>
</head>
<body>
    <!-- Sidebar -->
    <div class="sidebar" id="sidebar">
        <button class="new-chat" onclick="newChat()">➕ New Chat</button>
        <div id="chatList"></div>
    </div>

    <!-- Mobile Menu Button -->
    <button class="sidebar-btn" onclick="toggleSidebar()">
        <i class="fas fa-bars"></i>
    </button>

    <div class="app-container">
        <header class="header">
            <div class="logo">🤖 Jarvis GPT</div>
            <div class="status" id="status">🔒 E2EE Active</div>
        </header>

        <div class="main-content">
            <div class="chat-area">
                <div class="chat-messages" id="messages"></div>
                
                <div class="input-area">
                    <div class="input-wrapper">
                        <textarea 
                            id="input" 
                            class="input-field" 
                            placeholder="Ask Jarvis anything..."
                            rows="1"
                        ></textarea>
                        <button class="send-btn" onclick="sendMessage()">
                            ➤
                        </button>
                    </div>
                    <div class="typing" id="typing">
                        <div class="typing-dots">
                            <div class="dot"></div>
                            <div class="dot"></div>
                            <div class="dot"></div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- GOD MODE BUTTON -->
    <button class="god-mode" onclick="godMode()" title="Admin: jarvis2024">
        👑
    </button>

    <script>
        // PWA Service Worker
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('sw.js');
        }

        // App State
        let chats = JSON.parse(localStorage.getItem('jarvisChats') || '[]');
        let currentChat = chats[0]?.id || 'chat1';
        let isTyping = false;
        let isGod = false;

        // DOM
        const el = {
            messages: document.getElementById('messages'),
            input: document.getElementById('input'),
            typing: document.getElementById('typing'),
            sidebar: document.getElementById('sidebar'),
            chatList: document.getElementById('chatList'),
            status: document.getElementById('status')
        };

        // Simple Encryption
        const encrypt = (text) => btoa(text.split('').map((c, i) => 
            String.fromCharCode(c.charCodeAt(0) ^ 'JARVIS'[i % 5].charCodeAt(0))
        ).join(''));

        const decrypt = (text) => {
            try {
                return atob(text).split('').map((c, i) => 
                    String.fromCharCode(c.charCodeAt(0) ^ 'JARVIS'[i % 5].charCodeAt(0))
                ).join('');
            } catch {
                return text;
            }
        };

        // Jarvis AI
        function jarvisAI(message) {
            const msg = message.toLowerCase();
            if (msg.includes('code')) {
                return `💻 CODE GENERATED\n\`\`\`python\ndef jarvis_app():\n    return "Mobile app ready! 🚀"\nprint(jarvis_app())\n\`\`\``;
            }
            if (msg.includes('god') || msg.includes('admin')) {
                return isGod ? '👑 GOD MODE ACTIVE - Full control granted!' : '🔑 Enter jarvis2024 for GOD MODE';
            }
            return `✅ "${message}"\n\n🤖 Jarvis understands. Processing through neural network...\n💡 Solution ready in 3 steps. Continue?`;
        }

        // UI Functions
        function addMessage(sender, text, isUser) {
            const div = document.createElement('div');
            div.className = `message ${isUser ? 'user' : 'ai'}`;
            div.innerHTML = `
                <div class="message-content">
                    <strong>${sender}:</strong><br>${text.replace(/\n/g, '<br>')}
                </div>
            `;
            el.messages.appendChild(div);
            el.messages.scrollTop = el.messages.scrollHeight;
        }

        async function sendMessage() {
            const text = el.input.value.trim();
            if (!text || isTyping) return;

            el.input.value = '';
            addMessage('You', text, true);
            showTyping(true);

            await new Promise(r => setTimeout(r, 1000));
            
            const response = jarvisAI(text);
            showTyping(false);
            addMessage('Jarvis', response);

            saveChat(currentChat, text, response);
            autoResize();
        }

        function showTyping(show) {
            isTyping = show;
            el.typing.style.display = show ? 'block' : 'none';
        }

        function saveChat(id, userMsg, aiMsg) {
            let chat = chats.find(c => c.id === id);
            if (!chat) {
                chat = { id, title: userMsg.slice(0, 30) + '...', messages: [] };
                chats.push(chat);
            }
            chat.messages.push({ user: encrypt(userMsg), ai: encrypt(aiMsg) });
            localStorage.setItem('jarvisChats', JSON.stringify(chats));
            updateChats();
        }

        function updateChats() {
            el.chatList.innerHTML = chats.map(chat => 
                `<div class="new-chat ${chat.id === currentChat ? 'active' : ''}" onclick="switchChat('${chat.id}')">
                    ${chat.title}
                </div>`
            ).join('');
        }

        function switchChat(id) {
            currentChat = id;
            const chat = chats.find(c => c.id === id);
            el.messages.innerHTML = '';
            chat.messages.forEach(msg => {
                addMessage('You', decrypt(msg.user));
                addMessage('Jarvis', decrypt(msg.ai));
            });
            updateChats();
        }

        function newChat() {
            currentChat = 'chat' + Date.now();
            el.messages.innerHTML = '<div class="message ai"><div class="message-content"><strong>Jarvis:</strong><br>New chat! 🔒 Encrypted.</div></div>';
            el.input.focus();
        }

        function godMode() {
            const pass = prompt('🔑 GOD MODE PASSWORD:');
            if (pass === 'jarvis2024') {
                isGod = true;
                el.status.textContent = '👑 GOD MODE';
                addMessage('Jarvis', '👑 GOD MODE UNLOCKED - You control everything!');
            }
        }

        function toggleSidebar() {
            el.sidebar.classList.toggle('open');
        }

        function autoResize() {
            el.input.style.height = 'auto';
            el.input.style.height = el.input.scrollHeight + 'px';
        }

        // Events
        el.input.addEventListener('keydown', e => {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                sendMessage();
            }
        });

        el.input.addEventListener('input', autoResize);

        // Init
        updateChats();
        autoResize();
        el.input.focus();

        // Install prompt
        let deferredPrompt;
        window.addEventListener('beforeinstallprompt', (e) => {
            deferredPrompt = e;
        });

        // Status bar for PWA
        window.addEventListener('appinstalled', () => {
            console.log('📱 PWA installed!');
        });
    </script>
</body>
</html>
