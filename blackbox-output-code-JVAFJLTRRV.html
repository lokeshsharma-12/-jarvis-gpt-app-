<!DOCTYPE html>
<html>
<head>
  <title>Jarvis GPT</title>
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#1e90ff">
  <meta name="viewport" content="width=device-width">
  <style>body{font-family:system-ui;background:#000;color:#fff;height:100vh;margin:0;display:flex;flex-direction:column;padding:20px}*{box-sizing:border-box}h1{color:#1e90ff;text-align:center;margin:20px 0;font-size:24px}.chat{flex:1;overflow:auto;padding:20px 0}.msg{margin:20px 0;padding:20px;border-radius:25px;max-width:90%;background:rgba(30,144,255,.2);border:1px solid #1e90ff40;font-size:16px}.user{background:#1e90ff;margin-left:auto}.input{padding:20px 0 60px;display:flex;gap:15px;border-top:1px solid #1e90ff40}input{flex:1;padding:18px;border-radius:30px;border:1px solid #1e90ff40;background:rgba(0,0,0,.6);color:#fff;font-size:18px}button{padding:18px 25px;background:#1e90ff;border:none;border-radius:30px;color:#fff;font-size:18px;cursor:pointer;font-weight:600}.god{position:fixed;bottom:25px;right:25px;width:70px;height:70px;border-radius:50%;background:#00ff88;color:#000;font-size:24px;font-weight:700;border:none;box-shadow:0 10px 30px #00ff8850;cursor:pointer}</style>
</head>
<body>
  <h1>🤖 JARVIS GPT</h1>
  <div class="chat" id="c">
    <div class="msg">🎉 Jarvis PWA Ready!<br>💬 Type → Enter<br>👑 Gold button → jarvis2024</div>
  </div>
  <div class="input">
    <input id="i" placeholder="Ask Jarvis...">
    <button onclick="s()">Send</button>
  </div>
  <button class="god" onclick="g()">👑</button>
  <script>
    const c=document.getElementById('c'),i=document.getElementById('i'),god=false;
    function m(t,u){const d=document.createElement('div');d.className='msg'+(u?' user':'');d.innerHTML=t;c.appendChild(d);c.scrollTop=c.scrollHeight}
    function s(){const t=i.value.trim();if(!t)return;m(t,true);i.value='';setTimeout(()=>{m(god?'👑 GOD MODE!':'✅ '+t,false)},800)}
    function g(){prompt('🔑 jarvis2024')==='jarvis2024'&&(god=true,m('👑 GOD MODE!',false))}
    i.onkeypress=e=>e.key==='Enter'&&s();i.focus();
  </script>
</body>
</html>
